<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>مولد يوزرات</title>
</head>
<body style="background:black;color:white;text-align:center;margin-top:50px;">

<h2>مولد يوزرات رباعية</h2>

<input id="letters" placeholder="حروف (مثال abcxyz)">
<br><br>

<input id="count" type="number" placeholder="عدد اليوزرات">
<br><br>

<label><input type="checkbox" id="dot"> نقطة .</label>
<label><input type="checkbox" id="underscore"> _</label>
<label><input type="checkbox" id="numbers"> أرقام</label>

<br><br>

<button onclick="generate()">توليد</button>

<p id="result"></p>

<script>
function generate() {
  let letters = document.getElementById("letters").value || "abcdefghijklmnopqrstuvwxyz";
  let count = parseInt(document.getElementById("count").value) || 10;
  let useDot = document.getElementById("dot").checked;
  let useUnderscore = document.getElementById("underscore").checked;
  let useNumbers = document.getElementById("numbers").checked;

  let results = [];

  for (let i = 0; i < count; i++) {
    let name = "";

    for (let j = 0; j < 4; j++) {
      name += letters[Math.floor(Math.random() * letters.length)];
    }

    let sep = "";
    if (useDot && useUnderscore) sep = Math.random() > 0.5 ? "." : "_";
    else if (useDot) sep = ".";
    else if (useUnderscore) sep = "_";

    if (sep) {
      name += sep;
      for (let j = 0; j < 2; j++) {
        name += letters[Math.floor(Math.random() * letters.length)];
      }
    }

    if (useNumbers) {
      name += Math.floor(Math.random() * 99);
    }

    results.push(name);
  }

  document.getElementById("result").innerHTML = results.join("<br>");
}
</script>

</body>
</html>
